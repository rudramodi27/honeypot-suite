name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies (libyara for yara-python)
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with black (check only)
        run: black --check --diff . || true   # non-blocking style check

      - name: Run test suite
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: honeypot-suite:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container health endpoint
        run: |
          docker run -d --name honeypot-test \
            -p 5000:5000 \
            -e HONEYPOT__SERVICES__SSH__ENABLED=false \
            -e HONEYPOT__SERVICES__HTTP__ENABLED=false \
            -e HONEYPOT__SERVICES__FTP__ENABLED=false \
            honeypot-suite:ci-test
          sleep 8
          curl -f http://localhost:5000/api/health || (docker logs honeypot-test && exit 1)
          docker stop honeypot-test

  security-scan:
    name: Dependency Security Scan (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known CVEs
        run: pip-audit -r requirements.txt
        # Not `|| true` — a clean run was confirmed locally
        # ("No known vulnerabilities found" against the pinned
        # requirements.txt as of this writing); if that ever changes,
        # the build SHOULD fail until the finding is triaged, not
        # silently pass.

  sast-scan:
    name: Static Application Security Testing (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit (fail on HIGH severity only)
        run: |
          bandit -r . -x ./tests,./yara_rules,./malware/samples \
            -f json -o bandit-report.json || true
          python3 -c "
          import json, sys
          d = json.load(open('bandit-report.json'))
          high = [r for r in d['results'] if r['issue_severity'] == 'HIGH']
          med  = [r for r in d['results'] if r['issue_severity'] == 'MEDIUM']
          print(f'Bandit: {len(high)} HIGH, {len(med)} MEDIUM, '
                f'{len(d[\"results\"]) - len(high) - len(med)} LOW findings')
          for r in high:
              print(f'  [HIGH] {r[\"filename\"]}:{r[\"line_number\"]} — {r[\"test_name\"]}')
          # Fail the build only on HIGH — MEDIUM/LOW are mostly
          # try/except/pass and random.choice() decoy-banner usage
          # (cosmetic, not security-relevant for non-cryptographic
          # randomness in fake server banners) reviewed and accepted.
          sys.exit(1 if high else 0)
          "

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  image-scan:
    name: Container Image Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: honeypot-suite:trivy-scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "honeypot-suite:trivy-scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"           # fail the build on CRITICAL/HIGH findings
          ignore-unfixed: true     # don't fail on CVEs with no available fix yet

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  sign-release:
    name: Sign Release Artifact (GPG)
    runs-on: ubuntu-latest
    needs: [test, sast-scan, security-scan, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build release tarball
        run: |
          tar czf honeypot-suite-release.tar.gz \
            --exclude='.git' --exclude='__pycache__' --exclude='*.db' \
            --exclude='logs' --exclude='malware/samples' .

      - name: Import signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        # GPG_PRIVATE_KEY is an armored private key stored as a GitHub
        # Actions secret — generate with:
        #   gpg --export-secret-keys --armor "your-key-id" | gh secret set GPG_PRIVATE_KEY
        # Skip this whole job (the `if:` above) until that secret
        # actually exists — an unset secret here would import nothing
        # and the next step would correctly fail closed.

      - name: Sign release tarball
        env:
          GPG_KEY_ID: ${{ secrets.GPG_SIGNING_KEY_ID }}
        run: |
          chmod +x hardening/sign_release.sh
          ./hardening/sign_release.sh sign honeypot-suite-release.tar.gz

      - name: Verify signature (self-check before upload)
        run: |
          ./hardening/sign_release.sh verify honeypot-suite-release.tar.gz

      - name: Upload signed release
        uses: actions/upload-artifact@v4
        with:
          name: signed-release
          path: |
            honeypot-suite-release.tar.gz
            honeypot-suite-release.tar.gz.asc

# =====================================================================
# monitoring/logstash/honeypot-pipeline.conf
# NOT validated against a live Logstash instance in this exercise —
# Logstash config-test (`logstash --config.test_and_exit`) wasn't run
# since no Logstash binary/JVM is available in this build environment.
# Syntax follows standard Logstash pipeline DSL; review field names
# against your actual indexed documents before production use.
# =====================================================================

input {
  beats {
    port => 5044
    ssl_enabled => true
    ssl_certificate_authorities => ["/etc/logstash/certs/ca.crt"]
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key => "/etc/logstash/certs/logstash.key"
    ssl_client_authentication => "required"
  }
}

filter {
  # ── GeoIP enrichment on the attacker source IP ──────────────────
  if [src_ip] {
    geoip {
      source => "src_ip"
      target => "geoip"
    }
  }

  # ── Normalize severity to a sortable integer for Kibana/Grafana
  #    threshold alerting (alert_threshold config lives in
  #    monitoring/grafana/honeypot-alerts.yml) ─────────────────────
  if [severity] {
    translate {
      field => "severity"
      destination => "severity_score"
      dictionary => {
        "LOW"      => "1"
        "MEDIUM"   => "2"
        "HIGH"     => "3"
        "CRITICAL" => "4"
      }
      fallback => "0"
    }
    mutate { convert => { "severity_score" => "integer" } }
  }

  # ── Tag known scanner tools for fast Kibana filtering ───────────
  if [event_type] == "SCANNER_DETECTED" or [event] =~ /(?i)(sqlmap|nikto|nmap|masscan|hydra)/ {
    mutate { add_tag => ["automated_scanner"] }
  }

  mutate {
    remove_field => ["[agent][ephemeral_id]", "[host][mac]"]
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  # ── Primary: Elasticsearch, for live dashboards (Kibana/Grafana) ─
  elasticsearch {
    hosts => ["https://elasticsearch.internal:9200"]
    ssl_enabled => true
    ssl_certificate_authority => "/etc/logstash/certs/ca.crt"
    api_key => "${ES_API_KEY}"
    index => "honeypot-events-%{+YYYY.MM.dd}"
  }

  # ── Secondary: immutable WORM archive — see
  #    hardening/s3_worm_archive.sh for the bucket setup (Object Lock
  #    in Compliance mode, so not even the AWS root account can
  #    delete/shorten retention before it expires). Requires the
  #    logstash-output-s3 plugin. ──────────────────────────────────
  s3 {
    bucket => "honeypot-log-archive-worm"
    region => "us-east-1"
    prefix => "honeypot-events/%{+YYYY}/%{+MM}/%{+dd}/"
    time_file => 15
    codec => "json_lines"
    server_side_encryption => true
    server_side_encryption_algorithm => "aws:kms"
  }

  # ── Tertiary: syslog forward, for orgs whose SIEM only speaks
  #    syslog (Wazuh manager, traditional Splunk forwarder, etc.) ──
  syslog {
    host => "siem.internal"
    port => 514
    protocol => "tcp"
    facility => "local0"
    severity => "%{severity}"
  }
}

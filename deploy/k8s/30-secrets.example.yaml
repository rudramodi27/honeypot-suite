# =====================================================================
# deploy/k8s/30-secrets.example.yaml
#
# THIS FILE CONTAINS PLACEHOLDERS ONLY. Never commit a real version of
# this file with actual secret values — `.gitignore` should exclude
# `30-secrets.yaml` (without `.example`) the moment you create one from
# this template. Prefer generating it from Vault at deploy time (see
# hardening/vault_commands.sh) over hand-editing and committing it.
#
# `stringData` (not `data`) is used below so the placeholders are
# readable here; kubectl base64-encodes it into `.data` automatically
# on apply — you do not need to pre-encode anything yourself.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: honeypot-db-credentials
  namespace: honeypot
type: Opaque
stringData:
  database_url: "postgresql://honeypot_app:__REPLACE_ME__@postgres.honeypot.svc.cluster.local:5432/honeypot"
---
apiVersion: v1
kind: Secret
metadata:
  name: honeypot-threat-intel-keys
  namespace: honeypot
type: Opaque
stringData:
  abuseipdb_api_key: "__REPLACE_ME__"
  virustotal_api_key: "__REPLACE_ME__"
  otx_api_key: "__REPLACE_ME__"
  shodan_api_key: "__REPLACE_ME__"
  cuckoo_api_token: "__REPLACE_ME__"
---
apiVersion: v1
kind: Secret
metadata:
  name: honeypot-dashboard-auth
  namespace: honeypot
type: Opaque
stringData:
  secret_key: "__REPLACE_WITH_RANDOM_32_BYTE_HEX__"
  # Generate with: python -c "from werkzeug.security import generate_password_hash; print(generate_password_hash('yourpassword'))"
  password_hash: "__REPLACE_WITH_WERKZEUG_HASH__"

# =====================================================================
# Generating this file FROM Vault instead of hand-typing secrets:
#
#   vault kv get -format=json secret/honeypot/db \
#     | jq -r '.data.data.database_url' \
#     > /tmp/db_url.txt
#
#   kubectl create secret generic honeypot-db-credentials \
#     --namespace honeypot \
#     --from-literal=database_url="$(cat /tmp/db_url.txt)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   shred -u /tmp/db_url.txt   # don't leave the plaintext on disk
#
# Or use the Vault Secrets Operator / External Secrets Operator to sync
# Vault paths into Kubernetes Secrets continuously instead of a one-shot
# script — see hardening/vault_commands.sh for the equivalent raw CLI
# flow this would automate.
# =====================================================================
